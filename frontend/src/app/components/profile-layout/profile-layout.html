<div class="sidebar-inner">
    <div class="todo-logo">
        <mat-icon class="brand-icon">auto_awesome</mat-icon>
        <span class="brand-name">TaskyCute</span>
    </div>

<div class="profile-card">
    <div class="profile-header">
        <img class="avatar" [src]="miAvatar" alt="Foto de Perfil">
    <div class="user-info">
        <span class="user-name">Luna Pink</span>
        <span class="user-email">luna@gmail.com</span>
        <button mat-icon-button class="settings-btn"><mat-icon>settings</mat-icon></button>
    </div>
    
</div> 

<div class="progress-section">
    <div class="progress-labels">
        <span>Progreso Diario</span>
        <span class="percentage">2/7</span>
    </div>
    <mat-progress-bar mode="determinate" value="30"></mat-progress-bar> 
</div>

<div class="streak-badge">
    <mat-icon>local_fire_department</mat-icon>
    <span>3 días seguidos!</span>
    <mat-icon class="star">star_border</mat-icon>
</div>
</div>
</div>
